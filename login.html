<!DOCTYPE html>
<html>
<head>
  <title>NutriScan Login</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div class="container">
  <div class="side-banner">
    <div>
      <h2>Welcome Back!</h2>
     
      <p>Login to analyze ingredients and check food compatibility with your health profile.</p>
    </div>
  </div>

  <div class="login-box">
    <h2 >Login</h2>
    <input type="email" id="loginEmail" placeholder="Email">
   <input 
  type="password" 
  id="loginPassword" 
  placeholder="Password"
  pattern="^(?=.*[A-Z])(?=.*[\W_]).{8,}$"
  title="Password must be at least 8 characters long, contain one uppercase letter and one special character"
  required
>

    <button onclick="login()">Login</button>
    <p>Don't have an account? <a href="register.html">Register here</a></p>
  </div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyAoN5ZxYtfs7Vn4erhVNOhBtfN7bmVqzOg",
    authDomain: "nutri-7675b.firebaseapp.com",
    projectId: "nutri-7675b",
    storageBucket: "nutri-7675b.firebasestorage.app",
    messagingSenderId: "814711518853",
    appId: "1:814711518853:web:f09ea659be5e44f872dbec",
    measurementId: "G-P06GMRED4L"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  function login() {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;

    auth.signInWithEmailAndPassword(email, password)
      .then(() => window.location.href = "dashboard.html")
      .catch(err => alert(err.message));
  }
</script>

</body>
</html>
